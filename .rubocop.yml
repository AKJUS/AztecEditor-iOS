# Opt in to new cops by default
AllCops:
  NewCops: enable

Metrics/BlockLength:
  Exclude:
    - 'WordPress-Aztec-iOS.podspec'
    - 'WordPress-Editor-iOS.podspec'

# Allow the Podspec filename to match the project
Naming/FileName:
  Exclude:
    - 'WordPress-Aztec-iOS.podspec'
    - 'WordPress-Editor-iOS.podspec'
    - 'Example/Carthage/Checkouts/Gridicons-iOS/Gridicons.podspec'
